<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:320px;background:#0a0a0f;color:#e2e8f0;font-family:'Segoe UI',sans-serif;font-size:13px}
.hdr{padding:14px 16px;background:#111118;border-bottom:1px solid #1e1e2e;display:flex;justify-content:space-between;align-items:center}
.ttl{font-size:16px;font-weight:700}.ttl span{color:#7c3aed}
.bdg{font-family:monospace;font-size:10px;padding:2px 8px;background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);border-radius:100px;color:#7c3aed}
.bdy{padding:14px 16px}
.tip{font-family:monospace;font-size:10px;color:#64748b;line-height:1.7;margin-bottom:10px;padding:8px;background:rgba(255,255,255,.02);border-radius:6px;border:1px solid #1e1e2e}
.sr{display:flex;justify-content:space-between;padding:6px 10px;background:#111118;border:1px solid #1e1e2e;border-radius:8px;margin-bottom:5px}
.sl{color:#64748b;font-size:11px;font-family:monospace}.sv{font-family:monospace;font-size:11px}
.ok{color:#22c55e}.none{color:#ef4444}
.btn{width:100%;padding:10px;border-radius:8px;border:none;cursor:pointer;font-family:monospace;font-size:12px;margin-bottom:7px;transition:all .2s}
.bp{background:#7c3aed;color:#fff}.bp:hover{background:#6d28d9}.bp:disabled{opacity:.5;cursor:not-allowed}
.bs{background:#1e1e2e;color:#e2e8f0}.bs:hover{background:#2a2a3a}
.bo{background:rgba(6,182,212,.1);color:#06b6d4;border:1px solid rgba(6,182,212,.3)}.bo:hover{background:rgba(6,182,212,.2)}
#lg{font-family:monospace;font-size:10px;color:#7c3aed;margin:5px 0;min-height:14px;text-align:center;line-height:1.6}
.dbg{font-family:monospace;font-size:9px;color:#475569;margin-top:8px;white-space:pre-wrap;max-height:120px;overflow-y:auto;padding:5px;background:#050508;border-radius:5px;display:none}
.ftr{padding:8px 16px;border-top:1px solid #1e1e2e;font-family:monospace;font-size:10px;color:#4b5563;text-align:center}
</style>
</head><body>
<div class="hdr"><div class="ttl">SRM <span>DESK</span></div><div class="bdg" id="bdg">CHECKING...</div></div>
<div class="bdy">
  <div class="tip" id="tip">Log in at academia.srmist.edu.in, then click Sync.</div>
  <div class="sr"><span class="sl">ATTENDANCE</span><span class="sv none" id="sa">not synced</span></div>
  <div class="sr"><span class="sl">MARKS</span><span class="sv none" id="sm">not synced</span></div>
  <div class="sr"><span class="sl">TIMETABLE</span><span class="sv none" id="st">not synced</span></div>
  <div id="lg"></div>
  <button class="btn bp" id="sync">⚡ Sync Data from SRM</button>
  <button class="btn bo" id="dash">🚀 Open Dashboard</button>
  <button class="btn bs" id="clr">🗑 Clear Data</button>
  <div class="dbg" id="dbg"></div>
</div>
<div class="ftr">SRM DESK — local, free, private</div>
<script src="popup.js"></script>
</body></html>
